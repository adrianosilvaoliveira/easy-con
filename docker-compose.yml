version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hospital_stock_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hospital
      POSTGRES_PASSWORD: hospital_secret
      POSTGRES_DB: hospital_stock
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hospital -d hospital_stock']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hospital_stock
    restart: unless-stopped
    ports:
      - '3333:3333'
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://hospital:hospital_secret@postgres:5432/hospital_stock?schema=public
      JWT_SECRET: change-this-super-secret-jwt-key-in-production-min-32-chars
      JWT_REFRESH_SECRET: change-this-super-secret-refresh-key-in-production-min-32-chars
      API_URL: http://localhost:3333
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs

volumes:
  postgres_data:
